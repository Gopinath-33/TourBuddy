<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserve Your Trip | TourBuddy</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#F0FDFA;
}

.reserve-section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

.reserve-box{
    background:#fff;
    width:100%;
    max-width:700px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.reserve-box h1{
    text-align:center;
    color:#14B8A6;
    margin-bottom:10px;
}

.reserve-box p{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

.form-group input,
.form-group select,
.form-group textarea{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
    border-color:#14B8A6;
}

.submit-btn{
    width:100%;
    padding:15px;
    border:none;
    background:#14B8A6;
    color:white;
    font-size:18px;
    border-radius:30px;
    cursor:pointer;
}

.submit-btn:hover{
    background:#0F766E;
}

</style>
</head>
<body>

<section class="reserve-section">

<div class="reserve-box">

<h1>✈️ Reserve Your Trip</h1>
<p>Fill in your details and our team will contact you soon.</p>

<form>

<div class="form-group">
<label>Full Name</label>
<input type="text" placeholder="Enter your name">
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" placeholder="Enter phone number">
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" placeholder="Enter email">
</div>

<div class="form-group">
<label>Select Destination</label>
<select>
<option>Chennai</option>
<option>Ooty</option>
<option>Madurai</option>
<option>Munnar</option>
<option>Dubai</option>
<option>Singapore</option>
<option>Bangkok</option>
<option>Spain</option>
</select>
</div>

<div class="form-group">
<label>Travel Date</label>
<input type="date">
</div>

<div class="form-group">
<label>Number of Travelers</label>
<input type="number" min="1" placeholder="Enter travelers count">
</div>

<div class="form-group">
<label>Special Request</label>
<textarea rows="4" placeholder="Any special requirements..."></textarea>
</div>

<button type="submit" class="submit-btn">
 Confirm Reservation
</button>

</form>

</div>

</section>

</body>
</html>
